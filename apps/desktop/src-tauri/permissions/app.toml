[[permission]]
identifier = "default"
description = "Default permissions for app commands"
commands.allow = [
  "get_default_shell",
  "get_home_dir",
  "exit_app",
  "resolve_repo_root",
  "get_git_branch",
  "rename_git_branch",
  "get_git_diff",
  "stage_all_changes",
  "unstage_all_changes",
  "load_config",
  "save_config",
  "spawn_pty",
  "write_pty",
  "resize_pty",
  "kill_pty"
]

[[permission]]
identifier = "all"
description = "Allow all app commands for the desktop app"
commands.allow = [
  "get_default_shell",
  "get_home_dir",
  "exit_app",
  "resolve_repo_root",
  "get_git_branch",
  "rename_git_branch",
  "get_git_diff",
  "stage_all_changes",
  "unstage_all_changes",
  "load_config",
  "save_config",
  "spawn_pty",
  "write_pty",
  "resize_pty",
  "kill_pty"
]
