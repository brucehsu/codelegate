name: Desktop Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build desktop app bundle
        run: pnpm --filter @codelegate/desktop tauri build

      - name: Verify macOS bundle does not link Homebrew libraries
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          binary_path="$(find apps/desktop/src-tauri/target -path '*/bundle/macos/Codelegate.app/Contents/MacOS/codelegate-desktop' -print -quit)"

          if [[ -z "$binary_path" ]]; then
            echo "Unable to locate built macOS app binary"
            exit 1
          fi

          echo "Inspecting $binary_path"
          otool -L "$binary_path"

          if otool -L "$binary_path" | grep -q '/opt/homebrew/'; then
            echo "macOS bundle links against Homebrew libraries, which breaks signed distribution builds."
            exit 1
          fi

      - name: Upload Linux AppImage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-appimage-linux
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Linux DEB artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-deb-linux
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload Linux RPM artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-rpm-linux
          path: apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload macOS DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
